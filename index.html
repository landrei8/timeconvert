// ============================================================
// TIME UTILITIES
// ============================================================
function getHourMinInTZ(utcMs, tz) {
  const s = new Intl.DateTimeFormat('en-US',{hour:'numeric',minute:'2-digit',hour12:false,timeZone:tz}).format(new Date(utcMs));
  const [h,m] = s.split(':').map(Number);
  return {hour: h % 24, minute: m};
}

function getDateStrInTZ(utcMs, tz) {
  return new Intl.DateTimeFormat('en-US',{weekday:'short',month:'short',day:'numeric',timeZone:tz}).format(new Date(utcMs));
}

function getFullTimeInTZ(utcMs, tz) {
  return new Intl.DateTimeFormat('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true,timeZone:tz}).format(new Date(utcMs));
}

function fmt12(h,m) {
  const ampm = h < 12 ? 'am' : 'pm';
  const h12  = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,'0')}${ampm}`;
}

function buildSlotUTCMs() {
  const refCity = cities[homeIdx] || cities[0];
  if (!refCity) return;
  const tz  = refCity.tz;
  const ymd = anchorDay.toLocaleDateString('en-CA');
  const midnight = new Date(new Intl.DateTimeFormat('en-US',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date(`${ymd}T00:00:00`)).replace(/(\d+)\/(\d+)\/(\d+)/,'$3-$1-$2'));
  const base = Date.parse(`${ymd}T00:00:00`) + (new Date(`${ymd}T00:00:00`) - new Date(new Intl.DateTimeFormat('en-US',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date(`${ymd}T00:00:00`)).replace(/(\d+)\/(\d+)\/(\d+),\s*/,'$3-$1-$2T')));
  slotUTCMs = [];
  for (let i = 0; i < SLOTS; i++) {
    const localMs = anchorDay.getTime() + i * SLOT_MINS * 60000;
    const {hour,minute} = getHourMinInTZ(localMs, tz);
    const diff = (hour * 60 + minute) - i * SLOT_MINS;
    slotUTCMs.push(localMs - diff * 60000);
  }
  // Simpler approach: use the local midnight of the reference city
  slotUTCMs = [];
  const dayStr = anchorDay.toLocaleDateString('en-CA');
  // Find UTC ms when it is midnight in ref city on anchorDay
  let lo = anchorDay.getTime() - 14*3600000;
  let hi = anchorDay.getTime() + 14*3600000;
  while (hi - lo > 60000) {
    const mid = Math.floor((lo+hi)/2);
    const {hour,minute} = getHourMinInTZ(mid, tz);
    if (hour === 0 && minute === 0) { lo = mid; break; }
    const totalMins = hour*60 + minute;
    if (totalMins > 0 && totalMins < 720) hi = mid;
    else lo = mid;
  }
  const midnightUTC = lo;
  // Start 24 slots (12h) before midnight so NOW can always be centered
  const startOffset = -24 * SLOT_MINS * 60000; // 12 hours before midnight
  for (let i = 0; i < SLOTS; i++) {
    slotUTCMs.push(midnightUTC + startOffset + i * SLOT_MINS * 60000);
  }
}

function getOffsetLabel(cityTz) {
  const nowMs = Date.now();
  const refCity = cities[homeIdx] || cities[0];
  const h0 = getHourMinInTZ(nowMs, refCity.tz);
  const h1 = getHourMinInTZ(nowMs, cityTz);
  const diff = (h1.hour * 60 + h1.minute) - (h0.hour * 60 + h0.minute);
  let adj = diff;
  if (adj > 720) adj -= 1440;
  if (adj < -720) adj += 1440;
  const sign  = adj >= 0 ? '+' : '-';
  const absH  = Math.floor(Math.abs(adj) / 60);
  const absM  = Math.abs(adj) % 60;
  const disp  = absM > 0 ? `${sign}${absH}h${absM}m` : `${sign}${absH}h`;
  const cls   = adj > 0 ? 'pos' : adj < 0 ? 'neg' : 'zero';
  return `<span class="offset-badge ${cls}">${adj === 0 ? 'same time' : disp} vs ${refCity.name}</span>`;
}

function positionNowMarker(el, tz) {
  if (!slotUTCMs.length) { el.style.display = 'none'; return; }
  const nowMs = Date.now();
  // Find which slot the current time falls in
  let slotIdx = -1;
  for (let i = 0; i < SLOTS - 1; i++) {
    if (nowMs >= slotUTCMs[i] && nowMs < slotUTCMs[i + 1]) { slotIdx = i; break; }
  }
  if (slotIdx === -1) { el.style.display = 'none'; return; }
  // Precise sub-slot position
  const fraction = (nowMs - slotUTCMs[slotIdx]) / (slotUTCMs[slotIdx + 1] - slotUTCMs[slotIdx]);
  el.style.display = '';
  el.style.left = ((slotIdx + fraction) * CELL_W) + 'px';
}

function updateNowMarkers() {
  cities.forEach((city, idx) => {
    const el = document.getElementById('now-marker-' + idx);
    if (el) positionNowMarker(el, city.tz);
  });
}

function render() {
  buildSlotUTCMs();
  const area = document.getElementById('clocksArea');
  area.innerHTML = '';

  if (cities.length === 0) {
    area.innerHTML = '<div class="empty-state"><div class="big">+</div><div>Search for a city above to get started</div></div>';
    return;
  }

  cities.forEach((city, idx) => buildRow(city, idx));
  updateSelInfo();

  // Use setTimeout to ensure full layout before reading clientWidth
  setTimeout(() => {
    const nowLocal = getHourMinInTZ(Date.now(), (cities[homeIdx] || cities[0]).tz);
    const nowMs    = Date.now();
    // Get precise sub-slot position of now
    let nowPx = 0;
    for (let i = 0; i < SLOTS - 1; i++) {
      if (nowMs >= slotUTCMs[i] && nowMs < slotUTCMs[i+1]) {
        const frac = (nowMs - slotUTCMs[i]) / (slotUTCMs[i+1] - slotUTCMs[i]);
        nowPx = (i + frac) * CELL_W;
        break;
      }
    }
    const firstWrapEl = document.getElementById('tlwrap_0');
    if (!firstWrapEl) return;
    const visibleW = firstWrapEl.clientWidth;
    const scrollTo = Math.max(0, nowPx - visibleW / 2);
    document.querySelectorAll('.timeline-wrap').forEach(w => { w.scrollLeft = scrollTo; });
  }, 50);

  document.querySelectorAll('.timeline').forEach(tl => setupDrag(tl));

  startClockTick();
}

  const homeTip = document.createElement('span');
  homeTip.className = 'home-tip';

  if (idx !== homeIdx && homeIdx >= 0 && homeIdx < cities.length) {
    const offWrap = document.createElement('div');
    offWrap.innerHTML = getOffsetLabel(city.tz);
    info.appendChild(offWrap.firstChild);
  }

  // City name
  const nameDiv = document.createElement('div');
  nameDiv.className = 'city-name-big';
  nameDiv.innerHTML = city.name + ' <span class="tz-tag">' + city.abbr + '</span>';

  const countryDiv = document.createElement('div');
  countryDiv.className = 'country-label';

  info.appendChild(countryDiv);

  // Clock
  const ctimeDiv = document.createElement('div');
  ctimeDiv.className = 'ctime';
  ctimeDiv.id = 'ctime_' + idx;
  info.appendChild(ctimeDiv);
  const cdateDiv = document.createElement('div');
  cdateDiv.className = 'ctime-date';
  cdateDiv.id = 'cdate_' + idx;
  info.appendChild(cdateDiv);

  // Range label
  const rangeDiv = document.createElement('div');
  rangeDiv.className = 'range-time-label';
  rangeDiv.id = 'rlabel_' + idx;
  info.appendChild(rangeDiv);
  updateRangeLabelEl(rangeDiv, idx);

  // Remove button
  const rb = document.createElement('button');
  rb.className = 'remove-btn';
  rb.textContent = '\u2715';
  if (idx === homeIdx) { rb.style.display = 'none'; rb.disabled = true; }
  rb.addEventListener('click', function(e) {
    e.stopPropagation();
    if (idx === homeIdx) return;
    if (homeIdx > idx) homeIdx--;
    cities.splice(idx, 1);
    selStart = null; selEnd = null;
    savePrefs(); render();
  });
  info.appendChild(rb);

  // Timeline
  const tlWrap = document.createElement('div');
  tlWrap.className = 'timeline-wrap';
  tlWrap.id = 'tlwrap_' + idx;

  const tl = document.createElement('div');
  tl.className = 'timeline';
  tl.id = 'tl_' + idx;
  tl.style.width = (SLOTS * CELL_W) + 'px';

  const overlay = document.createElement('div');
  overlay.className = 'sel-overlay';
  overlay.id = 'overlay_' + idx;
  if (selStart === null) overlay.style.display = 'none';
  else positionOverlay(overlay);

  const lh = document.createElement('div');
  lh.className = 'drag-handle left';
  lh.id = 'dh-left-' + idx;
  overlay.appendChild(lh);
  const rh = document.createElement('div');
  rh.className = 'drag-handle right';
  rh.id = 'dh-right-' + idx;
  overlay.appendChild(rh);
  tl.appendChild(overlay);

  // NOW marker — only meaningful for home city row but added to all (positioned identically)
  const nowMarker = document.createElement('div');
  nowMarker.className = 'now-marker';
  nowMarker.id = 'now-marker-' + idx;
  tl.appendChild(nowMarker);
  positionNowMarker(nowMarker, city.tz);

  for (let i = 0; i < SLOTS; i++) {
    const utcMs = slotUTCMs[i];
    const {hour, minute} = getHourMinInTZ(utcMs, city.tz);
    const isHalf = minute === 30;
    const cell = document.createElement('div');
    cell.className = 'hour-cell' + (isHalf ? ' half' : '');
    cell.dataset.slot = i;
    const h12 = hour % 12 || 12;
    const ampm = hour < 12 ? 'am' : 'pm';
    if (isHalf) {
      cell.innerHTML = '<span class="hour-num">:30</span>';
    } else {
      cell.innerHTML = '<span class="hour-num">' + h12 + '</span><span class="ampm-tiny">' + ampm + '</span>';
    }
    tl.appendChild(cell);
  }

  tlWrap.appendChild(tl);
  row.appendChild(info);
  row.appendChild(tlWrap);
  area.appendChild(row);

  tlWrap.addEventListener('scroll', () => {
    const sl = tlWrap.scrollLeft;
    document.querySelectorAll('.timeline-wrap').forEach(w => { if (w !== tlWrap) w.scrollLeft = sl; });
  });

  updateClockEl(idx);
}

// ============================================================
// CLOCK TICK
// ============================================================
let clockInterval = null;
function startClockTick() {
  if (clockInterval) clearInterval(clockInterval);
  clockInterval = setInterval(() => {
    cities.forEach((city, idx) => updateClockEl(idx));
    updateNowMarkers();
  }, 10000); // update every 10s — enough precision for a 30-min slot
  cities.forEach((city, idx) => updateClockEl(idx));
  updateNowMarkers();
}
function updateClockEl(idx) {
  const city = cities[idx];
  if (!city) return;
  const nowMs = Date.now();
  const ct = document.getElementById('ctime_' + idx);
  const cd = document.getElementById('cdate_' + idx);
  if (!ct) return;
  if (selStart !== null) {
    ct.style.display = 'none';
    if (cd) cd.style.display = 'none';
  } else {
    ct.style.display = '';
    if (cd) cd.style.display = '';
    ct.textContent = getFullTimeInTZ(nowMs, city.tz);
    if (cd) cd.textContent = getDateStrInTZ(nowMs, city.tz);
  }
}

// ============================================================
// SELECTION OVERLAY
// ============================================================
function positionOverlay(overlay) {
  if (selStart === null) { overlay.style.display = 'none'; return; }
  const s = Math.min(selStart, selEnd);
  const e = Math.max(selStart, selEnd);
  overlay.style.display = '';
  overlay.style.left  = (s * CELL_W) + 'px';
  overlay.style.width = ((e - s + 1) * CELL_W) + 'px';
}

function updateAllOverlays() {
  cities.forEach((_, idx) => {
    const o = document.getElementById('overlay_' + idx);
    if (o) positionOverlay(o);
  });
  updateSelInfo();

  cities.forEach((_, idx) => updateClockEl(idx));
}

function updateRangeLabelEl(el, idx) {
  if (selStart === null || !slotUTCMs.length) { el.textContent = ''; return; }
  const s = Math.min(selStart, selEnd);
  const e = Math.max(selStart, selEnd);
  const city = cities[idx];
  if (!city) return;
  const hs = getHourMinInTZ(slotUTCMs[s], city.tz);
  const he = getHourMinInTZ(slotUTCMs[Math.min(e + 1, SLOTS - 1)], city.tz);
  el.textContent = fmt12(hs.hour, hs.minute) + ' \u2013 ' + fmt12(he.hour, he.minute);
}

function updateSelInfo() {
  const el = document.getElementById('selInfo');
  if (!el) return;
  if (selStart === null) { el.innerHTML = ''; return; }
  const s = Math.min(selStart, selEnd);
  const e = Math.max(selStart, selEnd);
  const mins = (e - s + 1) * SLOT_MINS;
  const h = Math.floor(mins / 60), m = mins % 60;
  const dur = (h > 0 ? h + 'h ' : '') + (m > 0 ? m + 'm' : '');
  el.innerHTML = 'Selected: <strong>' + dur + '</strong>';
}

// ============================================================
// DRAG LOGIC
// ============================================================
function setupDrag(tl) {
  tl.addEventListener('mousedown', onDragStart);
  tl.addEventListener('touchstart', onTouchStart, {passive: false});
}
function onDragStart(e) {
  if (e.button !== 0) return;
  activeDragWrap = e.currentTarget.closest('.timeline-wrap');
  determineDragMode(e.clientX);
  isDragging = true;
  e.preventDefault();
}
function onTouchStart(e) {
  activeDragWrap = e.currentTarget.closest('.timeline-wrap');
  determineDragMode(e.touches[0].clientX);
  isDragging = true;
  e.preventDefault();
}
function determineDragMode(clientX) {
  dragStartClientX = clientX;
  dragSavedStart = selStart !== null ? Math.min(selStart, selEnd) : null;
  dragSavedEnd   = selStart !== null ? Math.max(selStart, selEnd) : null;
  if (activeDragWrap) {
    const wrapIdx = activeDragWrap.id.replace('tlwrap_', '');
    const lh = document.getElementById('dh-left-'  + wrapIdx);
    const rh = document.getElementById('dh-right-' + wrapIdx);
    const ov = document.getElementById('overlay_'  + wrapIdx);
    if (lh) { const r = lh.getBoundingClientRect(); if (clientX >= r.left-8 && clientX <= r.right+8) { dragMode = 'left';  return; } }
    if (rh) { const r = rh.getBoundingClientRect(); if (clientX >= r.left-8 && clientX <= r.right+8) { dragMode = 'right'; return; } }
    if (ov && selStart !== null) { const r = ov.getBoundingClientRect(); if (clientX >= r.left && clientX <= r.right) { dragMode = 'move'; return; } }
  }
  dragMode = 'new';
  const slot = clientXToSlot(clientX);
  selStart = slot; selEnd = slot;
  updateAllOverlays();
}
document.addEventListener('mousemove', e => { if (!isDragging) return; handleDragMove(e.clientX); });
document.addEventListener('touchmove', e => { if (!isDragging) return; handleDragMove(e.touches[0].clientX); e.preventDefault(); }, {passive: false});
function handleDragMove(clientX) {
  const slot = clientXToSlot(clientX);
  if (dragMode === 'new') {
    selEnd = slot;
  } else if (dragMode === 'left') {
    selStart = Math.min(slot, dragSavedEnd); selEnd = dragSavedEnd;
  } else if (dragMode === 'right') {
    selStart = dragSavedStart; selEnd = Math.max(slot, dragSavedStart);
  } else if (dragMode === 'move') {
    const dx = clientX - dragStartClientX;
    const dSlots = Math.round(dx / CELL_W);
    const len = dragSavedEnd - dragSavedStart;
    const ns = Math.max(0, Math.min(SLOTS - 1 - len, dragSavedStart + dSlots));
    selStart = ns; selEnd = ns + len;
  }
  updateAllOverlays();
}
document.addEventListener('mouseup',  () => { isDragging = false; dragMode = null; });
document.addEventListener('touchend', () => { isDragging = false; dragMode = null; });
function clientXToSlot(clientX) {
  const wrap = activeDragWrap || document.getElementById('tlwrap_0');
  if (!wrap) return 0;
  const rect = wrap.getBoundingClientRect();
  const x = clientX - rect.left + wrap.scrollLeft;
  return Math.max(0, Math.min(SLOTS - 1, Math.floor(x / CELL_W)));
}

// SEARCH
// ============================================================
function parseUTCOffset(q) {
  const m = q.match(/^(?:utc|gmt)([+-])(\d{1,2})(?::(\d{2}))?$/i);
  if (!m) return null;
  const sign = m[1] === '+' ? 1 : -1;
  const h = parseInt(m[2]);
  const min = parseInt(m[3] || '0');
  const totalMins = sign * (h * 60 + min);
  return TZ_ZONES.filter(z => {
    const om = z.offset.match(/([+-])(\d{2}):(\d{2})/);
    if (!om) return false;
    const zMins = (om[1]==='+' ? 1 : -1) * (parseInt(om[2]) * 60 + parseInt(om[3]));
    return zMins === totalMins;
  });
}
const searchInput = document.getElementById('searchInput');
const dropdown    = document.getElementById('dropdown');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  dropdown.innerHTML = '';
  if (!q) { dropdown.classList.remove('open'); return; }
  const cityRes = CITIES.filter(c => c.name.toLowerCase().includes(q) || c.country.toLowerCase().includes(q)).slice(0, 6);
  const utcRes  = parseUTCOffset(q);
  const tzRes   = utcRes && utcRes.length ? utcRes : TZ_ZONES.filter(z => z.abbr.toLowerCase().includes(q) || z.tz.toLowerCase().includes(q) || z.label.toLowerCase().includes(q) || z.offset.includes(q)).slice(0, 4);
  if (cityRes.length === 0 && tzRes.length === 0) { dropdown.classList.remove('open'); return; }
  if (cityRes.length) {
    const sep = document.createElement('div'); sep.className = 'drop-sep'; sep.textContent = 'Cities'; dropdown.appendChild(sep);
    cityRes.forEach(city => {
      const item = document.createElement('div'); item.className = 'drop-item';
      item.innerHTML = '<span class="badge city">city</span>' + city.name + ', ' + city.country;
      item.addEventListener('click', () => {
        if (!cities.find(c => c.name === city.name)) { cities.push(city); savePrefs(); render(); }
        searchInput.value = ''; dropdown.classList.remove('open');
      });
      dropdown.appendChild(item);
    });
  }
  if (tzRes.length) {
    const sep = document.createElement('div'); sep.className = 'drop-sep'; sep.textContent = 'Timezones'; dropdown.appendChild(sep);
    tzRes.forEach(zone => {
      const item = document.createElement('div'); item.className = 'drop-item';
      item.innerHTML = '<span class="badge tz">tz</span>' + zone.abbr + ' &mdash; ' + zone.label + ' (' + zone.offset + ')';
      item.addEventListener('click', () => {
        const city = {name: zone.abbr, country: zone.label, tz: zone.tz, abbr: zone.abbr};
        if (!cities.find(c => c.tz === city.tz && c.name === city.name)) { cities.push(city); savePrefs(); render(); }
        searchInput.value = ''; dropdown.classList.remove('open');
      });
      dropdown.appendChild(item);
    });
  }
  dropdown.classList.add('open');
});
document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) dropdown.classList.remove('open'); });

function buildDateNav() {
  const nav = document.getElementById('dateNav');
  nav.innerHTML = '';
  const today = new Date(); today.setHours(0,0,0,0);
  for (let d = -1; d <= 4; d++) {
    const day = new Date(today); day.setDate(today.getDate() + d);
    const btn = document.createElement('button');
    btn.className = 'date-btn' + (day.getTime() === anchorDay.getTime() ? ' active' : '');
    const label = d === 0 ? 'Today' : d === 1 ? 'Tomorrow' : d === -1 ? 'Yesterday' : day.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    btn.textContent = label;
    btn.addEventListener('click', () => { anchorDay = day; buildDateNav(); render(); });
    nav.appendChild(btn);
  }
}

document.getElementById('navNow').addEventListener('click', () => {
  const nowMs = Date.now();
  let nowPx = 0;
  for (let i = 0; i < SLOTS - 1; i++) {
    if (nowMs >= slotUTCMs[i] && nowMs < slotUTCMs[i+1]) {
      const frac = (nowMs - slotUTCMs[i]) / (slotUTCMs[i+1] - slotUTCMs[i]);
      nowPx = (i + frac) * CELL_W;
      break;
    }
  }
  const wrap0 = document.getElementById('tlwrap_0');
  const visibleW = wrap0 ? wrap0.clientWidth : 600;
  const scrollTo = Math.max(0, nowPx - visibleW / 2);
  document.querySelectorAll('.timeline-wrap').forEach(w => { w.scrollLeft = scrollTo; });
});

function savePrefs() {
  try {
    localStorage.setItem('worldtime_cities', JSON.stringify(cities.map(c => ({name: c.name, tz: c.tz}))));
    localStorage.setItem('worldtime_home', String(homeIdx));
    showToast('Preferences saved');
  } catch(e) {}
}
function loadPrefs() {
  try {
    const raw = localStorage.getItem('worldtime_cities');
    if (raw === null) return false;
    const saved = JSON.parse(raw);
    if (!Array.isArray(saved)) return false;
    if (saved.length === 0) { cities = []; homeIdx = -1; return true; }
    cities = saved.map(s => CITIES.find(c => c.name === s.name && c.tz === s.tz)).filter(Boolean);
    const sh = localStorage.getItem('worldtime_home');
    homeIdx = sh !== null ? parseInt(sh) : 0;
    if (homeIdx >= cities.length) homeIdx = cities.length > 0 ? 0 : -1;
    return true;
  } catch(e) { return false; }
}

function showGeoBanner(cityName, flag, countryLabel) {
  const banner     = document.getElementById('geoBanner');
  const geoFlag    = document.getElementById('geoFlag');
  const geoMsg     = document.getElementById('geoMsg');
  const geoSub     = document.getElementById('geoSub');
  const addBtn     = document.getElementById('geoAddBtn');
  const dismissBtn = document.getElementById('geoDismissBtn');
  if (!banner) return;
  geoFlag.textContent = flag;
  geoMsg.textContent  = 'We detected you are from ' + countryLabel + '.';
  const alreadyInList = cities.find(c => c.name === cityName);
  if (alreadyInList) {
    geoSub.textContent   = cityName + ' is already in your list.';
    addBtn.style.display = 'none';
  } else {
    geoSub.textContent   = 'Would you like to add ' + cityName + '?';
    addBtn.style.display = '';
  }
  banner.classList.add('show');
  addBtn.onclick = () => {
    const city = CITIES.find(c => c.name === cityName);
    if (city && !cities.find(c => c.name === city.name)) {
      cities.unshift(city);
      savePrefs(); render();
    }
    banner.classList.remove('show');
    try { localStorage.setItem('worldtime_geo_dismissed', '1'); } catch(e) {}
  };
  dismissBtn.onclick = () => {
    banner.classList.remove('show');
    try { localStorage.setItem('worldtime_geo_dismissed', '1'); } catch(e) {}
  };
}

function detectLocation() {
  try { if (localStorage.getItem('worldtime_geo_dismissed') === '1') return; } catch(e) {}
  fetch('https://ip-api.com/json/?fields=countryCode,country')
    .then(r => r.json())
    .then(data => {
      if (!data || !data.countryCode) return;
      const match = GEO_COUNTRY_MAP[data.countryCode];
      if (!match) return;
      showGeoBanner(match.city, match.flag, match.label);
    })
    .catch(() => {});
}

function renderPresetsList() {

  list.innerHTML = '';

  for (let i = 0; i < MAX_PRESETS; i++) {
    const preset = presets[i] || null;
    const row = document.createElement('div');
    row.className = 'preset-row';

    // Load/name button
    const loadBtn = document.createElement('button');
    loadBtn.className = 'preset-slot-btn' + (preset ? '' : ' empty');
    if (preset) {
      loadBtn.title = 'Load: ' + preset.cities.map(c => c.name).join(', ');
      loadBtn.innerHTML = '<strong style="color:var(--accent)">' + (i+1) + '.</strong> ' + preset.name;
    } else {
      loadBtn.textContent = (i+1) + '. Empty slot';
    }
    loadBtn.addEventListener('click', () => {
      if (!preset) {
        saveCurrentAsPreset(i);
      } else {
        const loaded = preset.cities
          .map(s => CITIES.find(c => c.name === s.name && c.tz === s.tz))
          .filter(Boolean);
        if (loaded.length === 0) return;
        cities = loaded;
        homeIdx = preset.homeIdx >= 0 && preset.homeIdx < loaded.length ? preset.homeIdx : 0;
        savePrefs(); render();
        document.getElementById('presetsPanel').classList.remove('open');
        showToast('"' + preset.name + '" loaded');
      }
    });

    // Save/overwrite btn
    const saveBtn = document.createElement('button');
    saveBtn.className = 'preset-save-btn';
    saveBtn.textContent = preset ? 'Update' : 'Save';
    saveBtn.title = preset ? 'Overwrite with current cities' : 'Save current cities here';
    saveBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      saveCurrentAsPreset(i);
    });

    row.appendChild(loadBtn);
    row.appendChild(saveBtn);

    if (preset) {
      // Edit name btn
      const editBtn = document.createElement('button');
      editBtn.className = 'preset-edit-btn';
      editBtn.textContent = '✎';
      editBtn.title = 'Rename preset';
      editBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        showRenameRow(i, preset.name, row, list);
      });
      row.appendChild(editBtn);

      // Delete btn
      const delBtn = document.createElement('button');
      delBtn.className = 'preset-del-btn';
      delBtn.textContent = '✕';
      delBtn.title = 'Delete preset';
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const presets = loadPresets();
        presets.splice(i, 1);
        savePresetsToStorage(presets);
        renderPresetsList();
        showToast('Preset deleted');
      });
      row.appendChild(delBtn);
    }

    list.appendChild(row);
  }
}

function showRenameRow(slotIdx, currentName, originalRow, list) {
  // Replace the row temporarily with an inline rename form
  const renameRow = document.createElement('div');
  renameRow.className = 'preset-row';

  const input = document.createElement('input');
  input.className = 'preset-name-input';
  input.value = currentName;
  input.maxLength = 30;
  input.placeholder = 'Enter preset name...';

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'preset-confirm-btn';
  confirmBtn.textContent = 'Save';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'preset-del-btn';
  cancelBtn.textContent = '✕';
  cancelBtn.title = 'Cancel';

  function doRename() {
    const newName = input.value.trim();
    if (!newName) { input.focus(); return; }
    const presets = loadPresets();
    if (presets[slotIdx]) {
      presets[slotIdx].name = newName;
      savePresetsToStorage(presets);
    }
    renderPresetsList();
    showToast('Preset renamed');
  }

  confirmBtn.addEventListener('click', (e) => { e.stopPropagation(); doRename(); });
  cancelBtn.addEventListener('click',  (e) => { e.stopPropagation(); renderPresetsList(); });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); doRename(); }
    if (e.key === 'Escape') { e.preventDefault(); renderPresetsList(); }
  });

  renameRow.appendChild(input);
  renameRow.appendChild(confirmBtn);
  renameRow.appendChild(cancelBtn);
  list.replaceChild(renameRow, originalRow);
  setTimeout(() => { input.focus(); input.select(); }, 10);
}

function saveCurrentAsPreset(slotIdx) {
  if (cities.length === 0) { showToast('No cities to save'); return; }
  const presets = loadPresets();
  while (presets.length <= slotIdx) presets.push(null);

  // Keep existing name if overwriting, otherwise auto-generate
  const existingName = presets[slotIdx] && presets[slotIdx].name;
  const autoName = cities.slice(0,3).map(c => c.name).join(', ') + (cities.length > 3 ? '...' : '');
  presets[slotIdx] = {
    name: existingName || autoName,
    cities: cities.map(c => ({name: c.name, tz: c.tz})),
    homeIdx: homeIdx,
    savedAt: Date.now()
  };
  savePresetsToStorage(presets);
  renderPresetsList();
  showToast('Saved to preset ' + (slotIdx+1));
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.classList.remove('show'); toast.textContent = 'Preferences saved'; }, 1800);
}

// Toggle panel
document.getElementById('presetsBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  const panel = document.getElementById('presetsPanel');
  const isOpen = panel.classList.contains('open');
  if (!isOpen) renderPresetsList();
  panel.classList.toggle('open');
});
document.addEventListener('click', (e) => {
  if (!e.target.closest('#presetsWrap')) {
    document.getElementById('presetsPanel').classList.remove('open');
  }
});

buildDateNav();
try { const t = localStorage.getItem('worldtime_theme'); if (t) applyTheme(t); } catch(e) {}
const hadSaved = loadPrefs();
if (!hadSaved) {
  cities = [
    CITIES.find(c => c.name === 'Bucharest'),
    CITIES.find(c => c.name === 'London'),
    CITIES.find(c => c.name === 'New York'),
    CITIES.find(c => c.name === 'Mumbai'),
    CITIES.find(c => c.name === 'Tokyo'),
  ].filter(Boolean);
}
render();
setTimeout(detectLocation, 800);
</script>
